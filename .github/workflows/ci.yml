name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sge
          POSTGRES_PASSWORD: sge
          POSTGRES_DB: sge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://sge:sge@localhost:5432/sge
      SESSION_SECRET: ci-secret-no-es-para-produccion
      NODE_ENV: test

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run db:migrate

      - run: npm run seed

      - run: npm run build:css

      - run: npm test
